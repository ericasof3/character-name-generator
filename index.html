<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>Character Name Generator</title>
  </head>
  <body>
    <header>
      <h1>Character Name Generator</h1>
    </header>

    <main>
      <form>
        <input
          type="text"
          placeholder="Enter a character description"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" />
      </form>
      <div>
        Name:
        <br />
        Ethymology:
        <br />
        Reasoning:
      </div>
    </main>

    <footer>
      This AI project was coded by
      <a href="https://github.com/ericasof3" target="_blank">Érica Lemos</a> and
      is
      <a
        href="https://github.com/ericasof3/character-name-generator"
        target="_blank"
      >
        open-sourced on GitHub</a
      >
      and is
      <a href="https://character-name-generator.netlify.app/" target="_blank"
        >hosted on Netlify</a
      >.
    </footer>

    <script src="src/index.js"></script>
  </body>
</html>
